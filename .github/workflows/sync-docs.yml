name: Sync Docs with Source

on:
  push:
    paths:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.py'
      - '**/*.java'
      - '**/*.go'
      - '**/*.rb'
      - '**/*.cpp'
      - '**/*.c'
      - '**/*.cs'
      - '**/*.php'
      - '**/*.rs'
      - '**/*.swift'
      - '**/*.kt'
      - '**/*.scala'
      - '**/*.sh'
      - '**/*.pl'
      - '**/*.html'
      - '**/*.css'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - '!docs/**'
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.py'
      - '**/*.java'
      - '**/*.go'
      - '**/*.rb'
      - '**/*.cpp'
      - '**/*.c'
      - '**/*.cs'
      - '**/*.php'
      - '**/*.rs'
      - '**/*.swift'
      - '**/*.kt'
      - '**/*.scala'
      - '**/*.sh'
      - '**/*.pl'
      - '**/*.html'
      - '**/*.css'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - '!docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ドキュメント同期ツールを「アクション」として実行
      - name: Update documentation
        uses: github/gh-aw@main
        with:
          # create.md の仕様に合わせた引数の渡し方
          args: 'update-docs --source . --docs ./docs'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/
          git diff --cached --quiet || git commit -m 'docs: update documentation to match source code [auto-sync]'
          git push || echo 'No changes to commit.'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}