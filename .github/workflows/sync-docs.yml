name: Sync Docs with Source

on:
  push:
    branches: ["main"]
    paths:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.py'
      - '**/*.java'
      - '**/*.go'
      - '**/*.rb'
      - '**/*.cpp'
      - '**/*.c'
      - '**/*.cs'
      - '**/*.php'
      - '**/*.rs'
      - '**/*.swift'
      - '**/*.kt'
      - '**/*.scala'
      - '**/*.sh'
      - '**/*.pl'
      - '**/*.html'
      - '**/*.css'
      - '**/*.json'
      - '**/*.yml'
      - '**/*.yaml'
      - '!docs/**'
  workflow_dispatch:

jobs:
  agent:
    # これが GitHub Agentic Workflows を動かすための専用の設定です
    uses: github/gh-aw/.github/workflows/agent.yml@main
    with:
      # 「何をさせるか」の指示（後述する Markdown ファイルを指定）
      instructions: .github/workflows/sync-docs.md
    secrets:
      # AI（Copilot等）を動かすためのトークンが必要です
      GH_AW_TOKEN: ${{ secrets.GITHUB_TOKEN }}